<main class="text-secondary-foreground mt-[10rem]">

        <h1 class="text-center text-4xl font-bold mb-[5rem]">

                </div>

                <div class="absolute top-[9rem] md:top-[5rem] left-[-10.375rem] md:left-[-26.375rem] flex items-center">

                </div>

    </section>

    <section class="mb-20">

            {{ 'experience.professionalTitle' | translate }}
