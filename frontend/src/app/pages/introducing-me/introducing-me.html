<main class="text-secondary-foreground px-10 py-20">
    <section class="flex items-center justify-center gap-16 mt-20 leading-8 max-w-6xl mx-auto">
        <div class="flex-1">
            <h1 class="text-5xl font-bold">{{ 'introducing.name' | translate }}</h1>
            <h2 class="text-3xl mb-6">{{ 'introducing.title' | translate }}</h2>

            <p class="mb-6 max-w-xl">{{ 'introducing.description' | translate }}</p>
            <a [routerLink]="['/']" fragment="contact">
                <app-button [text]="'introducing.ctaButton' | translate"></app-button>
            </a>
        </div>

        <div class="flex-shrink-0">
            <img src="introducing-me-img/alicia.jpg" alt="i18n"
                class="rounded-full w-[20rem] h-[20rem] hover:opacity-50 transition-opacity duration-300 ease-in-out" />
        </div>
    </section>

    <div class="flex justify-center gap-20 mt-12">
        <a href="https://github.com/itisalicia" target="_blank">
            <img src="introducing-me-img/github.svg" alt="github"
                class="w-[3rem] h-[3rem] hover:scale-110 transition ease-in-out" />
        </a>
        <a href="https://www.linkedin.com/in/alicia-magro1/" target="_blank">
            <img src="introducing-me-img/linkedin.svg" alt="linkedin"
                class="w-[3.2rem] h-[3.2rem] hover:scale-110 transition ease-in-out" />
        </a>
    </div>
</main>
