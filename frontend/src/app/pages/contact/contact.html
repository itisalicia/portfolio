<section class="text-secondary-foreground mt-[7rem] text-center">
    <h1 i18n class="text-4xl font-bold">
        Contactez-moi
    </h1>
    <h2 class="text-secondary-foreground mt-5" i18n> Mon profil vous intéresse ? Envoyez-moi un message 😊 </h2>

    <form (ngSubmit)="onSubmit()" class="relative">
        <div class="flex flex-col items-center m-auto mt-[3rem] w-[45rem]">
            <z-form-control class="flex flex-row-reverse mt-[1rem] gap-2" [helpText]="nameLabel">
                <input type='text' [placeholder]="namePlaceholder" name="name" required [(ngModel)]="name"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-[25rem]" />
            </z-form-control>

            <z-form-control class="flex flex-row-reverse mt-[1rem] gap-2" [helpText]="emailLabel">
                <input type="email" [placeholder]="emailPlaceholder" name="email" required [(ngModel)]="email"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-[25rem]"
                    [ngClass]="{'border-red-500': emailError}" (input)="verifyEmail($event.target.value)" />
            </z-form-control>

            <z-form-control class="flex flex-row-reverse mt-[1rem] gap-2" [helpText]="messageLabel">
                <textarea [(ngModel)]="message"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-[29rem] h-[13rem]"
                    [placeholder]="messagePlaceholder" name="message" required></textarea>
            </z-form-control>

            @if(emailError) {
            <div class="text-red-500 text-sm mt-1">{{ emailError }}</div>
            }

            @if (emailSuccess) {
            <div class="text-green-500 text-sm mt-1">{{ emailSuccess }}</div>
            }

            <app-button [text]="submitButtonText" class="m-[3rem]" type="submit"></app-button>
        </div>

        <div class="absolute right-[10rem] top-[4rem]">
            <a href="https://github.com/itisalicia" target="_blank">
                <img src="skills-img/github.svg" alt="github"
                    class="w-[3rem] h-[3rem] mb-[6rem] cursor-pointer hover:scale-110 transition ease-in-out" />
            </a>
            <a href="https://www.linkedin.com/in/alicia-magro1/" target="_blank">

                <img src="introducing-me-img/linkedin.svg" alt="linkedin"
                    class="w-[3.2rem] h-[3.2rem] cursor-pointer hover:scale-110 transition ease-in-out" />
            </a>
        </div>
    </form>
</section>
