<section class="text-secondary-foreground mt-[10rem] text-center">
    <h1 i18n class="text-4xl font-bold">
        Contactez-moi
    </h1>
    <h2 class="text-secondary-foreground mt-5"> Mon profil vous intéresse ? Envoyez-moi un message 😊 </h2>

    <form (ngSubmit)="onSubmit()">
        <div class="flex flex-col items-center w-[30rem] m-auto mt-[3rem]">
            <z-form-control class="flex flex-row-reverse mt-[1rem] gap-2" i18n helpText="Nom :">
                <input type='text' placeholder="Votre nom..." name="name" required [(ngModel)]="name"
                    class=" bg-background p-3 border-2 border-primary rounded-lg resize-none w-[25rem]" />
            </z-form-control>

            <z-form-control class="flex flex-row-reverse mt-[1rem] gap-2" i18n helpText="Email : ">
                <input type="email" placeholder="Votre email..." name="email" required [(ngModel)]="email"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-[25rem]"
                    [ngClass]="{'border-red-500': emailError}" (input)="verifyEmail($event.target.value)" />
            </z-form-control>

            <z-form-control class="flex flex-row-reverse mt-[1rem] gap-2" i18n helpText="Votre message :">
                <textarea type='text' [(ngModel)]="message"
                    class=" bg-background p-3 border-2 border-primary rounded-lg resize-none w-[26rem] h-[10rem]"
                    placeholder="Votre message..." name="message" required></textarea>
            </z-form-control>

            @if(emailError) {
            <div class="text-red-500 text-sm mt-1">{{ emailError }}</div>
            }

            @if (emailSuccess) {
            <div class="text-green-500 text-sm mt-1">{{ emailSuccess }}</div>
            }

            <app-button text="Envoyer" class="m-[1rem]" type="submit" i18n></app-button>
        </div>
    </form>
</section>
