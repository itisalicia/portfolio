<section class="text-secondary-foreground mt-[7rem] text-center pb-[3rem]">
    <h1 class="text-4xl font-bold">
        {{ 'contact.title' | translate }}
    </h1>
    <h2 class="text-secondary-foreground mt-5">{{ 'contact.description' | translate }}</h2>

    <form (ngSubmit)="onSubmit()" class="lg:relative">
        <div class="flex flex-col items-center m-auto mt-[3rem] w-full px-6 md:px-12 lg:w-[45rem] lg:px-0">

            <z-form-control class="flex flex-col-reverse md:flex-row-reverse mt-[1rem] gap-2 w-full md:w-auto" [helpText]="'contact.nameLabel' | translate">
                <input type='text' [placeholder]="'contact.namePlaceholder' | translate" name="name" required [(ngModel)]="name"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-full md:w-[25rem]" />
            </z-form-control>

            <z-form-control class="flex flex-col-reverse md:flex-row-reverse mt-[1rem] gap-2 w-full md:w-auto" [helpText]="'contact.emailLabel' | translate">
                <input type="email" [placeholder]="'contact.emailPlaceholder' | translate" name="email" required [(ngModel)]="email"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-full md:w-[25rem]"
                    [ngClass]="{'border-red-500': emailError}" (input)="verifyEmail($any($event.target).value)" />
            </z-form-control>

            <z-form-control class="flex flex-col-reverse md:flex-row-reverse mt-[1rem] gap-2 w-full md:w-auto" [helpText]="'contact.messageLabel' | translate">
                <textarea [(ngModel)]="message"
                    class="bg-background p-3 border-2 border-primary rounded-lg resize-none w-full md:w-[29rem] h-[13rem]"
                    [placeholder]="'contact.messagePlaceholder' | translate" name="message" required></textarea>
            </z-form-control>

            @if (emailError) {
            <div class="text-red-500 text-sm mt-1">{{ emailError | translate }}</div>
            }

            @if (emailSuccess) {
            <div class="text-green-500 text-sm mt-1">{{ emailSuccess | translate }}</div>
            }

            <div class="m-[3rem]">
                <app-button [text]="'contact.sendButton' | translate" type="submit"></app-button>
            </div>
        </div>
    </form>

        <div class="flex justify-center gap-8 mt-2 md: mb-2">
            <a href="https://github.com/itisalicia" target="_blank">
                <img src="skills-img/github.svg" alt="github"
                    class="w-[3rem] h-[3rem] cursor-pointer hover:scale-110 transition ease-in-out" />
            </a>
            <a href="https://www.linkedin.com/in/alicia-magro1/" target="_blank">
                <img src="introducing-me-img/linkedin.svg" alt="linkedin"
                    class="w-[3.2rem] h-[3.2rem] cursor-pointer hover:scale-110 transition ease-in-out" />
            </a>
        </div>
</section>
