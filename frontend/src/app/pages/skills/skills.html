<main class="text-secondary-foreground mt-[10rem]">
    <section class="grid gap-8 mt-[5rem] grid-cols-1 md:grid-cols-2 lg:grid-cols-2 justify-items-center">
        <h1 class="col-span-full text-center text-4xl font-bold">
            {{ 'skills.title' | translate }}
        </h1>

        <app-cards class="mt-[2rem]" title="Frontend" iconSize="w-[2.5rem]" [skills]="[
      { name: 'HTML', icon: '/skills-img/html.svg', alt: 'HTML' },
      { name: 'CSS', icon: '/skills-img/css.svg', alt: 'CSS' },
      { name: 'JavaScript', icon: '/skills-img/js.svg', alt: 'JavaScript' },
      { name: 'TypeScript', icon: '/skills-img/ts.svg', alt: 'TypeScript' },
      { name: 'React', icon: '/skills-img/react.svg', alt: 'React' },
      { name: 'Angular', icon: '/skills-img/angular.svg', alt: 'Angular' },
      { name: 'Tailwind', icon: '/skills-img/tailwind.svg', alt: 'Tailwind CSS' },
      { name: 'Bootstap', icon : '/skills-img/bootstrap.svg', alt: 'Bootstrap' }
    ]"></app-cards>

        <app-cards class="mt-[2rem]" title="Backend" iconSize="w-[2.5rem]" [skills]="[
      { name: 'Node.js', icon: 'skills-img/node.svg', alt: 'Node.js'},
      { name: 'Express', icon: 'skills-img/express.svg', alt: 'Express'},
      { name: 'GraphQL', icon: 'skills-img/graphql.svg', alt: 'GraphQL'},
      { name: 'TypeORM', icon: 'skills-img/typeorm.png', alt: 'TypeORM'},
      { name: 'Ruby', icon: 'skills-img/ruby.svg', alt: 'Ruby'},
      { name: 'Rails', icon: 'skills-img/rails.svg', alt: 'Ruby on rails'},
      { name: 'MySQL', icon: 'skills-img/mysql.svg', alt: 'MySQL'},
      { name: 'PostgreSQL', icon: 'skills-img/postgre.svg', alt: 'PostgreSQL'},
      { name: 'SQLite', icon: 'skills-img/sqlite.svg', alt: 'SQLite'},
    ]"></app-cards>

        <app-cards class="mt-[2rem]" [title]="'skills.otherTools' | translate" iconSize="w-[2.5rem]" [skills]="[
      { name: 'Docker', icon: '/skills-img/docker.svg', alt: 'Docker' },
      { name: 'CI/CD', icon: '/skills-img/ci.svg', alt: 'CI/CD' },
      { name: 'Github', icon: '/skills-img/github.svg', alt: 'Github' },
      { name: 'Gitlab', icon: '/skills-img/gitlab.svg', alt: 'Gitlab' },
      { name: 'Jira', icon: '/skills-img/jira.svg', alt: 'Jira' },
      { name: 'Figma', icon: '/skills-img/figma.svg', alt: 'Figma' },
      { name: 'VSCode', icon: '/skills-img/vscode.svg', alt: 'VSCode CSS' },
      { name: 'Postman', icon : '/skills-img/postman.svg', alt: 'Postman' }
    ]"></app-cards>
    </section>
</main>
